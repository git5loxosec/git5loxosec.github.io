<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LoxoSec by git5</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png">
</head>

<body>

<div class="app">

    <!-- FLOATING GLASS HEADER -->
    <div class="glass-header">
        <div class="logo">LoxoSec</div>
        <div class="header-icons">
            <a href="https://github.com/git5loxosec" target="_blank">⚡</a>
        </div>
    </div>

    <!-- HERO -->
    <section class="hero">
        <h1>by git5</h1>
        <p>Offensive Research • Linux • Security</p>
    </section>

    <!-- TOOL CARDS -->
    <section class="tools">

        <div class="card">
            <img src="authai.jpg">
            <div class="card-content">
                <h2>Authai</h2>
                <p>Termux-first CLI for building debug APKs.</p>
                <div class="buttons">
                    <a href="#" class="primary">View</a>
                    <a href="#" class="secondary">Download</a>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="rmetashell.png">
            <div class="card-content">
                <h2>rMETAshell</h2>
                <p>Inject reverse shells into metadata.</p>
                <div class="buttons">
                    <a href="#" class="primary">View</a>
                    <a href="#" class="secondary">Download</a>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="loxocat.png">
            <div class="card-content">
                <h2>Loxocat2</h2>
                <p>Pen-testing toolbox with listener utilities.</p>
                <div class="buttons">
                    <a href="#" class="primary">View</a>
                    <a href="#" class="secondary">Download</a>
                </div>
            </div>
        </div>

    </section>

</div>

</body>
</html>
