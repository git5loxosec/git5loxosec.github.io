<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoxoSec by git5</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png">
</head>

<body>

<div class="bg-overlay"></div>

<!-- FLOATING GLASS HEADER -->
<header class="glass-header">
    <div class="logo">
        <h1>LoxoSec</h1>
        <span>by git5</span>
    </div>
    <div class="header-actions">
        <a href="https://github.com/git5loxosec" target="_blank">GitHub</a>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="app-container">

    <!-- Authai -->
    <div class="app-card">
        <img src="authai.jpg" class="card-img">
        <div class="card-content">
            <h2>Authai</h2>
            <p>Termux-first CLI builder for debug APK workflows.</p>
            <div class="card-buttons">
                <a href="#">View</a>
                <a href="#">Download</a>
            </div>
        </div>
    </div>

    <!-- rMETAshell -->
    <div class="app-card">
        <img src="rmetashell.png" class="card-img">
        <div class="card-content">
            <h2>rMETAshell</h2>
            <p>Reverse shell metadata injection utility.</p>
            <div class="card-buttons">
                <a href="#">View</a>
                <a href="#">Download</a>
            </div>
        </div>
    </div>

    <!-- Loxocat2 -->
    <div class="app-card">
        <img src="loxocat.png" class="card-img">
        <div class="card-content">
            <h2>Loxocat2</h2>
            <p>Penetration toolkit with payload & listener utilities.</p>
            <div class="card-buttons">
                <a href="#">View</a>
                <a href="#">Download</a>
            </div>
        </div>
    </div>

</main>

<footer class="app-footer">
   LoxoSec 2022 <br> Built with ♥️ & 🐘
</footer>

</body>
</html>
